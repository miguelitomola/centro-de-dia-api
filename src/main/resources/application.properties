# ===== BASE DE DATOS H2 =====
spring.datasource.url=jdbc:h2:mem:${H2_DB_NAME}
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=${H2_DB_USER}
spring.datasource.password=${H2_DB_PASSWORD}

# ===== JPA / HIBERNATE =====
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# ===== CONSOLA H2 (para ver tablas en el navegador) =====
spring.h2-console.enabled=true
spring.h2-console.path=${H2_CONSOLE_PATH}

# ===== FORMATO JSON =====
spring.jackson.serialization.indent_output=true

# ===== DATOS INICIALES =====
spring.jpa.defer-datasource-initialization=true
